  <!-- Moustaches -->
  <path d="M98 120 H112" stroke="#333" stroke-width="2"/>
  <path d="M98 126 H112" stroke="#333" stroke-width="2"/>
  <path d="M138 120 H152" stroke="#333" stroke-width="2"/>
  <path d="M138 126 H152" stroke="#333" stroke-width="2"/>
  <!-- Pattes -->
  <ellipse cx="95" cy="210" rx="12" ry="28"
           fill="#D6D1CB"/>
  <ellipse cx="155" cy="210" rx="12" ry="28"
           fill="#D6D1CB"/>
  <!-- Queue relevée -->
  <path d="M180 175 Q210 155 200 130"
        stroke="#BDB7B1"
        stroke-width="10"
        fill="none"
        stroke-linecap="round"/>
